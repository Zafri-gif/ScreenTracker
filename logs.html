      _set(key, val) { localStorage.setItem(key, JSON.stringify(val)); },

      getUsers()     { return this._get('st_users', {}); },
      saveUsers(u)   { this._set('st_users', u); },
      getLogs()      { return this._get('st_logs_' + (currentUser || ''), []); },
      saveLogs(l)    { if (currentUser) this._set('st_logs_' + currentUser, l); },
      getSettings()  { return this._get('st_settings_' + (currentUser || ''), { goal: 8 }); },
      saveSettings(s){ if (currentUser) this._set('st_settings_' + currentUser, s); },

  <script>
    /* STATE */
    let currentUser = sessionStorage.getItem('st_current_user') || null;
    let chartInstances = {};
    let logSort = { field: 'date', dir: 'desc' };
    let logPage = 1;
    const LOGS_PER_PAGE = 8;
    let confirmCallback = null;
    let nextId = 100;

    /* INITIALIZATION — Merge demo users into localStorage */
    (function init() {
      const users = DB.getUsers();
      Object.entries(DEMO_USERS).forEach(([u, data]) => {
        if (!users[u]) users[u] = data;
      });
      DB.saveUsers(users);
    })();

    /* TOAST */
    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      const icons = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info' };
      const t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.innerHTML = '<i class="fa-solid ' + (icons[type]||icons.info) + '"></i><span>' + msg + '</span>';
      c.appendChild(t);
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
    }

    /* NAVIGATION */
    function navigateTo(page) {
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.dataset.page === page));
      const titles = { dashboard:'Dashboard', logs:'Screen Logs', apps:'Applications', analytics:'Analytics', settings:'Settings' };
      document.getElementById('pageTitle').textContent = titles[page] || 'Dashboard';
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      if (page === 'dashboard') initDashboard();
      if (page === 'logs') { logPage = 1; renderLogs(); }
      if (page === 'apps') renderApps();
      if (page === 'analytics') initAnalytics();
      if (page === 'settings') loadSettings();
      closeSidebar();
      const scroller = document.querySelector('#appSection main .flex-1.overflow-y-auto');
      if (scroller) scroller.scrollTop = 0;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

    /* UTILITY HELPERS */
    function getAppMeta(name) { return APP_META[name] || { icon:'fa-solid fa-window-maximize', category:'Other', color:'#888888' }; }
    function fmtDuration(h, m) { return h + 'h ' + String(m).padStart(2,'0') + 'm'; }
    function totalMinutes(log) { return (log.hours || 0) * 60 + (log.minutes || 0); }
    function fmtDate(d) { const dt = new Date(d + 'T00:00:00'); return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
    function fmtTime(t) { if (!t) return ''; const [h,m] = t.split(':'); const hr = parseInt(h); return ((hr > 12 ? hr - 12 : hr || 12) + ':' + m + ' ' + (hr >= 12 ? 'PM' : 'AM')); }

    /* EXPORT FUNCTIONS */
    function exportCSV() {
      const logs = DB.getLogs();
      if (logs.length === 0) { showToast('No logs to export.', 'error'); return; }
      let csv = 'Date,Application,Hours,Minutes,Duration,Category,Time,Productive\n';
      logs.forEach(l => {
        csv += l.date + ',' + l.app + ',' + l.hours + ',' + l.minutes + ',"' + fmtDuration(l.hours, l.minutes) + '",' + l.category + ',' + (l.time || '') + ',' + (l.productive ? 'Yes' : 'No') + '\n';
      });
      downloadFile(csv, 'screentracker_logs.csv', 'text/csv');
      showToast('CSV exported successfully!', 'success');
    }

    function exportJSON() {
      const logs = DB.getLogs();
      if (logs.length === 0) { showToast('No logs to export.', 'error'); return; }
      const data = { exported: new Date().toISOString(), user: currentUser, totalLogs: logs.length, logs: logs };
      downloadFile(JSON.stringify(data, null, 2), 'screentracker_logs.json', 'application/json');
      showToast('JSON exported successfully!', 'success');
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    /* CONFIRM MODAL (replaces window.confirm) */
    function confirmAction(msg, callback) {
      document.getElementById('confirmText').textContent = msg;
      confirmCallback = callback;
      document.getElementById('confirmModal').classList.add('show');
    }
    function closeConfirmModal() { document.getElementById('confirmModal').classList.remove('show'); confirmCallback = null; }
    function executeConfirm() { if (confirmCallback) confirmCallback(); closeConfirmModal(); }

    /* CHART UTILS */
    function destroyAllCharts() {
      Object.values(chartInstances).forEach(c => { if (c) c.destroy(); });
      chartInstances = {};
    }

    // Set global Chart.js defaults
    if (window.Chart) {
      Chart.defaults.color = '#9898B0';
      Chart.defaults.borderColor = '#2A2A3C';
      Chart.defaults.font.family = "'DM Sans', sans-serif";
    }

    /* KEYBOARD SUPPORT */
    document.addEventListener('keydown', function(e) {
      if (e.target.classList.contains('sidebar-link') && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); e.target.click(); }
      if (e.key === 'Escape') { closeSidebar(); if (typeof closeLogModal === 'function') closeLogModal(); closeConfirmModal(); }
    });

    // Close modals on overlay click
    document.getElementById('confirmModal').addEventListener('click', function(e) { if (e.target === this) closeConfirmModal(); });
    if (document.getElementById('logModal')) {
      document.getElementById('logModal').addEventListener('click', function(e) { if (e.target === this) closeLogModal(); });
    }
  </script>

  <script>
    /* AUTH */
    function switchAuthTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
      clearAuthError();
    }

    function handleLogin(e) {
      e.preventDefault();
      clearAuthError();
      const u = document.getElementById('loginUser').value.trim();
      const p = document.getElementById('loginPass').value;
      if (!u || !p) return showAuthError('Please fill in both username and password.');
      const users = DB.getUsers();
      if (!users[u]) return showAuthError('User "' + u + '" does not exist.');
      if (users[u].password !== p) return showAuthError('Incorrect password. Please try again.');
      currentUser = u;
      sessionStorage.setItem('st_current_user', u);
      DB.seedIfEmpty(u);
      enterApp();
      showToast('Welcome back, ' + u + '!', 'success');
    }

    function handleRegister(e) {
      e.preventDefault();
      clearAuthError();
      const u = document.getElementById('regUser').value.trim();
      const em = document.getElementById('regEmail').value.trim();
      const p = document.getElementById('regPass').value;
      const c = document.getElementById('regConfirm').value;
      if (!u || !em || !p || !c) return showAuthError('All fields are required.');
      if (u.length < 3) return showAuthError('Username must be at least 3 characters.');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) return showAuthError('Please enter a valid email address.');
      if (p.length < 6) return showAuthError('Password must be at least 6 characters.');
      if (p !== c) return showAuthError('Passwords do not match.');
      const users = DB.getUsers();
      if (users[u]) return showAuthError('Username "' + u + '" is already taken.');
      users[u] = { password: p, email: em, since: new Date().toISOString().split('T')[0] };
      DB.saveUsers(users);
      currentUser = u;
      sessionStorage.setItem('st_current_user', u);
      DB.seedIfEmpty(u);
      enterApp();
      showToast('Account created successfully!', 'success');
    }

    function showAuthError(msg) { const el = document.getElementById('authError'); document.getElementById('authErrorText').textContent = msg; el.classList.remove('hidden'); }
    function clearAuthError() { document.getElementById('authError').classList.add('hidden'); }
    function togglePwVis(id, btn) { const i = document.getElementById(id); const ic = btn.querySelector('i'); if (i.type === 'password') { i.type = 'text'; ic.classList.replace('fa-eye','fa-eye-slash'); } else { i.type = 'password'; ic.classList.replace('fa-eye-slash','fa-eye'); } }
    
    function handleLogout() {
      destroyAllCharts();
      currentUser = null;
      sessionStorage.removeItem('st_current_user');
      if (document.getElementById('authSection') !== null) {
        document.getElementById('appSection').classList.add('hidden');
        document.getElementById('authSection').classList.remove('hidden');
        const lForm = document.getElementById('loginForm'); if (lForm) lForm.reset();
        const rForm = document.getElementById('registerForm'); if (rForm) rForm.reset();
        switchAuthTab('login');
      } else {
        window.location.href = 'index.html';
      }
      showToast('Signed out successfully.', 'success');
    }

    function enterApp() {
      if (document.getElementById('authSection') !== null) {
        window.location.href = 'dashboard.html';
      } else {
        const authSect = document.getElementById('authSection'); if (authSect) authSect.classList.add('hidden');
        const appSect = document.getElementById('appSection'); if (appSect) appSect.classList.remove('hidden');
        const sUsername = document.getElementById('sidebarUsername'); if (sUsername) sUsername.textContent = currentUser;
        const cDate = document.getElementById('currentDate');
        if (cDate) {
          const now = new Date();
          cDate.textContent = now.toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
        }
        populateAppSuggestions();
      }
    }

    function populateAppSuggestions() {
      const dl = document.getElementById('appSuggestions');
      if (dl) {
        dl.innerHTML = Object.keys(APP_META).map(a => '<option value="' + a + '">').join('');
      }
    }
  </script>

  <script>
    /* SCREEN LOGS — Full CRUD with sort, filter, paginate */
    function getFilteredLogs() {
      const logs = DB.getLogs();
      const searchEl = document.getElementById('logSearch');
      const search = searchEl ? (searchEl.value || '').toLowerCase() : '';
      
      const catEl = document.getElementById('logCategory');
      const cat = catEl ? catEl.value : 'all';
      
      const fromEl = document.getElementById('logDateFrom');
      const from = fromEl ? fromEl.value : '';
      
      const toEl = document.getElementById('logDateTo');
      const to = toEl ? toEl.value : '';

      return logs.filter(l => {
        if (search && !l.app.toLowerCase().includes(search)) return false;
        if (cat !== 'all' && l.category !== cat) return false;
        if (from && l.date < from) return false;
        if (to && l.date > to) return false;
        return true;
      });
    }

    function renderLogs() {
      let logs = getFilteredLogs();
      // Sort
      const f = logSort.field;
      const dir = logSort.dir === 'asc' ? 1 : -1;
      logs.sort((a, b) => {
        let va, vb;
        if (f === 'date') { va = a.date + (a.time||''); vb = b.date + (b.time||''); }
        else if (f === 'minutes') { va = totalMinutes(a); vb = totalMinutes(b); }
        else if (f === 'productive') { va = a.productive ? 1 : 0; vb = b.productive ? 1 : 0; }
        else { va = (a[f] || '').toString().toLowerCase(); vb = (b[f] || '').toString().toLowerCase(); }
        return va < vb ? -dir : va > vb ? dir : 0;
      });

      // Update sort arrows
      document.querySelectorAll('#logsTable thead th[data-sort]').forEach(th => {
        const arrow = th.querySelector('.sort-arrow');
        if (arrow) {
          if (th.dataset.sort === f) { arrow.className = 'fa-solid fa-sort-' + (logSort.dir === 'asc' ? 'up' : 'down') + ' sort-arrow active'; }
          else { arrow.className = 'fa-solid fa-sort sort-arrow'; }
        }
      });

      // Pagination
      const totalPages = Math.max(1, Math.ceil(logs.length / LOGS_PER_PAGE));
      if (logPage > totalPages) logPage = totalPages;
      const start = (logPage - 1) * LOGS_PER_PAGE;
      const pageLogs = logs.slice(start, start + LOGS_PER_PAGE);

      const countEl = document.getElementById('logCount');
      if (countEl) {
        countEl.textContent = 'Showing ' + pageLogs.length + ' of ' + logs.length + ' entries';
      }

      const tbody = document.querySelector('#logsTable tbody');
      if (tbody) {
        if (pageLogs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-txt-300">No logs found. Add one using the button above.</td></tr>';
        } else {
          tbody.innerHTML = pageLogs.map(log => {
            const meta = getAppMeta(log.app);
            const cs = CATEGORY_STYLES[log.category] || { bg:'rgba(136,136,136,0.15)', text:'#888' };
            const prod = log.productive ? '<span class="badge" style="background:rgba(0,214,143,0.15);color:#00D68F">Productive</span>' : '<span class="badge" style="background:rgba(255,71,87,0.12);color:#FF6B6B">Non-productive</span>';
            return '<tr><td class="whitespace-nowrap text-txt-300">' + fmtDate(log.date) + '</td><td><div class="flex items-center gap-2.5"><div class="w-7 h-7 rounded-md flex items-center justify-center" style="background:' + meta.color + '20"><i class="' + meta.icon + ' text-xs" style="color:' + meta.color + '"></i></div><span class="font-medium text-txt-50">' + log.app + '</span></div></td><td class="font-medium text-txt-50">' + fmtDuration(log.hours, log.minutes) + '</td><td><span class="badge" style="background:' + cs.bg + ';color:' + cs.text + '">' + log.category + '</span></td><td>' + prod + '</td><td><div class="flex gap-1.5"><button class="action-btn edit" onclick="editLog(' + log.id + ')" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button><button class="action-btn delete" onclick="confirmAction(\'Delete this log entry?\', function(){ deleteLog(' + log.id + '); })" title="Delete"><i class="fa-solid fa-trash"></i></button></div></td></tr>';
          }).join('');
        }
      }

      // Pagination controls
      const pag = document.getElementById('logPagination');
      if (pag) {
        if (totalPages <= 1) { pag.innerHTML = ''; return; }
        let pagHTML = '<span class="text-txt-300 text-xs">Page ' + logPage + ' of ' + totalPages + '</span><div class="flex gap-1.5">';
        pagHTML += '<button onclick="logPage=1;renderLogs()" class="px-2.5 py-1.5 rounded border border-base-400 text-txt-200 text-xs hover:bg-base-300 transition' + (logPage === 1 ? ' opacity-40 pointer-events-none' : '') + '"><i class="fa-solid fa-angles-left"></i></button>';
        pagHTML += '<button onclick="logPage=Math.max(1,logPage-1);renderLogs()" class="px-2.5 py-1.5 rounded border border-base-400 text-txt-200 text-xs hover:bg-base-300 transition' + (logPage === 1 ? ' opacity-40 pointer-events-none' : '') + '"><i class="fa-solid fa-angle-left"></i></button>';
        // Show page numbers around current
        for (let i = Math.max(1, logPage - 1); i <= Math.min(totalPages, logPage + 1); i++) {
          pagHTML += '<button onclick="logPage=' + i + ';renderLogs()" class="px-2.5 py-1.5 rounded border text-xs transition ' + (i === logPage ? 'border-accent bg-accent/15 text-accent' : 'border-base-400 text-txt-200 hover:bg-base-300') + '">' + i + '</button>';
        }
        pagHTML += '<button onclick="logPage=Math.min(' + totalPages + ',logPage+1);renderLogs()" class="px-2.5 py-1.5 rounded border border-base-400 text-txt-200 text-xs hover:bg-base-300 transition' + (logPage === totalPages ? ' opacity-40 pointer-events-none' : '') + '"><i class="fa-solid fa-angle-right"></i></button>';
        pagHTML += '<button onclick="logPage=' + totalPages + ';renderLogs()" class="px-2.5 py-1.5 rounded border border-base-400 text-txt-200 text-xs hover:bg-base-300 transition' + (logPage === totalPages ? ' opacity-40 pointer-events-none' : '') + '"><i class="fa-solid fa-angles-right"></i></button>';
        pagHTML += '</div>';
        pag.innerHTML = pagHTML;
      }
    }

    // Attach sorting event listeners on load
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('#logsTable thead th[data-sort]').forEach(th => {
        th.addEventListener('click', function() {
          const f = this.dataset.sort;
          if (logSort.field === f) logSort.dir = logSort.dir === 'asc' ? 'desc' : 'asc';
          else { logSort.field = f; logSort.dir = 'asc'; }
          renderLogs();
        });
      });
    });

    function clearLogFilters() {
      const searchEl = document.getElementById('logSearch'); if (searchEl) searchEl.value = '';
      const catEl = document.getElementById('logCategory'); if (catEl) catEl.value = 'all';
      const fromEl = document.getElementById('logDateFrom'); if (fromEl) fromEl.value = '';
      const toEl = document.getElementById('logDateTo'); if (toEl) toEl.value = '';
      logPage = 1;
      renderLogs();
    }

    /* LOG CRUD — Add / Edit / Delete */
    function openLogModal(editId) {
      const modal = document.getElementById('logModal');
      if (!modal) return;
      modal.classList.add('show');
      
      const form = document.getElementById('logForm');
      if (form) form.reset();
      
      const editIdEl = document.getElementById('logEditId');
      if (editIdEl) editIdEl.value = '';
      
      const modalTitle = document.getElementById('logModalTitle');
      
      if (editId) {
        const log = DB.getLogs().find(l => l.id === editId);
        if (!log) return;
        if (modalTitle) modalTitle.textContent = 'Edit Screen Log';
        if (editIdEl) editIdEl.value = log.id;
        
        const fDate = document.getElementById('logFormDate'); if (fDate) fDate.value = log.date;
        const fApp = document.getElementById('logFormApp'); if (fApp) fApp.value = log.app;
        const fCat = document.getElementById('logFormCategory'); if (fCat) fCat.value = log.category;
        const fHrs = document.getElementById('logFormHours'); if (fHrs) fHrs.value = log.hours;
        const fMins = document.getElementById('logFormMins'); if (fMins) fMins.value = log.minutes;
        const fTime = document.getElementById('logFormTime'); if (fTime) fTime.value = log.time || '';
        const fProd = document.getElementById('logFormProductive'); if (fProd) fProd.checked = log.productive;
      } else {
        if (modalTitle) modalTitle.textContent = 'Add Screen Log';
        const fDate = document.getElementById('logFormDate'); if (fDate) fDate.value = new Date().toISOString().split('T')[0];
        const fTime = document.getElementById('logFormTime'); if (fTime) fTime.value = new Date().toTimeString().slice(0, 5);
      }
    }

    function closeLogModal() {
      const modal = document.getElementById('logModal');
      if (modal) modal.classList.remove('show');
    }

    function updateFormDuration() {}

    function saveLog(e) {
      e.preventDefault();
      const editIdEl = document.getElementById('logEditId');
      const editId = editIdEl ? editIdEl.value : '';
      
      const fDate = document.getElementById('logFormDate');
      const fApp = document.getElementById('logFormApp');
      const fCat = document.getElementById('logFormCategory');
      const fHrs = document.getElementById('logFormHours');
      const fMins = document.getElementById('logFormMins');
      const fTime = document.getElementById('logFormTime');
      const fProd = document.getElementById('logFormProductive');

      const logData = {
        date: fDate ? fDate.value : '',
        app: fApp ? fApp.value.trim() : '',
        category: fCat ? fCat.value : '',
        hours: fHrs ? parseInt(fHrs.value) || 0 : 0,
        minutes: fMins ? parseInt(fMins.value) || 0 : 0,
        time: fTime ? fTime.value : '',
        productive: fProd ? fProd.checked : false,
      };
      
      if (!logData.app || !logData.category || !logData.date) {
        showToast('Please fill in all required fields.', 'error');
        return;
      }
      // Auto-detect category from known apps
      if (APP_META[logData.app] && !logData.category) logData.category = APP_META[logData.app].category;

      let logs = DB.getLogs();
      if (editId) {
        const idx = logs.findIndex(l => l.id === parseInt(editId));
        if (idx !== -1) { logs[idx] = { ...logs[idx], ...logData }; }
        showToast('Log entry updated.', 'success');
      } else {
        nextId = Math.max(nextId, ...logs.map(l => l.id), 0) + 1;
        logs.push({ id: nextId, ...logData });
        showToast('New log entry added.', 'success');
      }
      DB.saveLogs(logs);
      closeLogModal();
      renderLogs();
    }

    function editLog(id) { openLogModal(id); }

    function deleteLog(id) {
      let logs = DB.getLogs().filter(l => l.id !== id);
      DB.saveLogs(logs);
      showToast('Log entry deleted.', 'info');
      renderLogs();
    }
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (currentUser) {
        const sUsername = document.getElementById('sidebarUsername');
        if (sUsername) sUsername.textContent = currentUser;
        const cDate = document.getElementById('currentDate');
        if (cDate) {
          const now = new Date();
          cDate.textContent = now.toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
        }
        populateAppSuggestions();
        logPage = 1;
        renderLogs();
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
